<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClonePass | Unified Vault</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#0f172a">
</head>
<body>
    <div class="container">
        <div id="syncStatus" class="sync-tag">Ready</div>

        <section id="loginScreen" class="card">
            <h1>ClonePass v0.3.0</h1>
            <p class="subtitle">Secure Cloud Vault</p>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address" class="input-field">
                <input type="password" id="loginPass" placeholder="Login Password" class="input-field">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="handleAuth('login')">Login</button>
                <button class="btn-outline" onclick="handleAuth('signup')">Sign Up</button>
            </div>
        </section>

        <section id="mainScreen" class="hidden">
            <header class="vault-header">
                <h2>My Vault</h2>
                <button onclick="logout()" class="btn-outline" style="width: auto; padding: 6px 16px; margin: 0;">Logout</button>
            </header>

            <div class="card">
                <h4 id="formTitle" style="margin-top:0; margin-bottom: 15px;">Add New Account</h4>
                <input type="hidden" id="editIndex" value="-1">
                <input type="text" id="siteName" placeholder="Service (e.g. GitHub)" class="input-field">
                <input type="text" id="siteUser" placeholder="Username / Email" class="input-field">
                <input type="password" id="sitePass" placeholder="Password" class="input-field">
                
                <button id="saveBtn" onclick="saveSecret()">Save & Sync</button>
                <button id="cancelBtn" class="btn-outline hidden" onclick="resetForm()">Cancel Edit</button>
            </div>

            <div id="vaultList"></div>
            
            <button class="btn-danger" onclick="clearAll()">Wipe Local Cache</button>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCheYVUMg42Q8Rul_6e3n0u4L1nC_8Kf8Y",
          authDomain: "myvault-e154d.firebaseapp.com",
          projectId: "myvault-e154d",
          storageBucket: "myvault-e154d.firebasestorage.app",
          messagingSenderId: "504378515493",
          appId: "1:504378515493:web:e51359fffc8148d0d09fcc"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.dbDoc = doc; window.dbSet = setDoc; window.dbGet = getDoc;
        window.signUp = createUserWithEmailAndPassword;
        window.signIn = signInWithEmailAndPassword;

        onAuthStateChanged(window.auth, (user) => {
            window.currentUser = user || null;
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
