<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassVault | GitHub Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <section id="loginScreen" class="card">
            <h1>PassVault</h1>
            <p class="subtitle">Secure, Zero-Knowledge Storage</p>
            <div class="input-group">
                <label>Master Password</label>
                <input type="password" id="masterPass" placeholder="Unlock your vault">
            </div>
            <button onclick="unlockVault()">Unlock Vault</button>
            <div class="divider"><span>OR</span></div>
            <button class="btn-outline" onclick="triggerImport()">Import .JSON Vault</button>
            <input type="file" id="fileInput" hidden onchange="importVault(event)">
        </section>

        <section id="mainScreen" class="hidden">
            <header class="vault-header">
                <h2>My Passwords</h2>
                <div class="header-actions">
                    <button onclick="exportVault()" class="btn-success">Export</button>
                    <button onclick="location.reload()" class="btn-outline">Lock</button>
                </div>
            </header>

            <div class="card">
                <h4 id="formTitle">Add New Account</h4>
                <input type="hidden" id="editIndex" value="-1">
                <input type="text" id="siteName" placeholder="Website Name" class="input-field">
                <input type="text" id="siteUser" placeholder="Username / Email" class="input-field">
                <div class="pass-input-container">
                    <input type="text" id="sitePass" placeholder="Password" class="input-field">
                </div>
                <button id="saveBtn" onclick="saveSecret()">Save Account</button>
                <button id="cancelBtn" class="btn-outline hidden" onclick="resetForm()">Cancel Edit</button>
            </div>

            <div id="vaultList"></div>
            <button class="btn-danger" onclick="clearAll()">Wipe Local Data</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
