<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClonePass v0.2 | Sync Enabled</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div id="syncStatus" class="sync-tag">Cloud Disconnected</div>

        <section id="loginScreen" class="card">
            <h1>ClonePass</h1>
            <p class="subtitle">Secure Cloud Vault</p>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address" class="input-field">
                <input type="password" id="loginPass" placeholder="Login Password" class="input-field">
            </div>

            <div class="auth-buttons">
                <button onclick="handleAuth('login')">Login</button>
                <button class="btn-outline" onclick="handleAuth('signup')">Create Account</button>
            </div>    
        </section>

        <section id="mainScreen" class="hidden">
            <header class="vault-header">
                <h2>My Vault</h2>
                <div class="header-actions">
                    <button onclick="exportVault()" class="btn-success">Backup</button>
                    <button onclick="location.reload()" class="btn-outline">Lock</button>
                </div>
            </header>

            <div class="card">
                <h4 id="formTitle">Add Account</h4>
                <input type="hidden" id="editIndex" value="-1">
                <input type="text" id="siteName" placeholder="Service (e.g. GitHub)" class="input-field">
                <input type="text" id="siteUser" placeholder="Username / Email" class="input-field">
                <input type="text" id="sitePass" placeholder="Password" class="input-field">
                <button id="saveBtn" onclick="saveSecret()">Save & Sync</button>
                <button id="cancelBtn" class="btn-outline hidden" onclick="resetForm()">Cancel Edit</button>
            </div>

            <div id="vaultList"></div>
            <button class="btn-danger" onclick="clearAll()">Wipe Local Data</button>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCheYVUMg42Q8Rul_6e3n0u4L1nC_8Kf8Y",
          authDomain: "myvault-e154d.firebaseapp.com",
          projectId: "myvault-e154d",
          storageBucket: "myvault-e154d.firebasestorage.app",
          messagingSenderId: "504378515493",
          appId: "1:504378515493:web:e51359fffc8148d0d09fcc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.db = db;
        window.auth = auth;
        window.dbDoc = doc; window.dbSet = setDoc; window.dbGet = getDoc;
        window.signIn = signInWithEmailAndPassword;
        window.signUp = createUserWithEmailAndPassword;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                document.getElementById('masterPassSection').classList.remove('hidden');
            } else {
                window.currentUser = null;
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
